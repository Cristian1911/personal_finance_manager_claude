name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - '.github/workflows/pr-build-images.yml'
      - 'webapp/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'services/pdf_parser/**'
      - 'docker-compose.prod.yml'
      - 'infra/**'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force full rebuild (skip image promotion)'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  REPO: cristian1911/personal_finance_manager_claude
  GHCR_USERNAME: cristian1911

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      webapp_changed: ${{ steps.set-outputs.outputs.webapp_changed }}
      parser_changed: ${{ steps.set-outputs.outputs.parser_changed }}
      any_deploy: ${{ steps.set-outputs.outputs.any_deploy }}
      merge_sha: ${{ steps.find-pr.outputs.merge_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            webapp:
              - 'webapp/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            parser:
              - 'services/pdf_parser/**'
            deploy:
              - 'docker-compose.prod.yml'
              - 'infra/**'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/pr-build-images.yml'

      - name: Find PR merge SHA
        id: find-pr
        if: inputs.force_build != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Look up the merged PR to find the head SHA that was built in CI.
          # Works with squash, merge commit, and rebase merge strategies.
          PR_DATA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0] | {sha: .head.sha, number: .number}' 2>/dev/null || echo '{}')
          MERGE_SHA=$(echo "$PR_DATA" | jq -r '.sha // empty')
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number // empty')

          if [ -n "$MERGE_SHA" ]; then
            echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
            echo "Found PR #${PR_NUMBER} with head SHA: ${MERGE_SHA}"
          else
            echo "merge_sha=" >> "$GITHUB_OUTPUT"
            echo "No PR found — will do full build"
          fi

      - name: Set outputs
        id: set-outputs
        run: |
          IS_DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"
          WEBAPP="${{ steps.filter.outputs.webapp }}"
          PARSER="${{ steps.filter.outputs.parser }}"
          DEPLOY_FILES="${{ steps.filter.outputs.deploy }}"

          if [ "$IS_DISPATCH" = "true" ] || [ "$WEBAPP" = "true" ]; then
            echo "webapp_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "webapp_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$IS_DISPATCH" = "true" ] || [ "$PARSER" = "true" ]; then
            echo "parser_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "parser_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$IS_DISPATCH" = "true" ] || \
             [ "$WEBAPP" = "true" ] || \
             [ "$PARSER" = "true" ] || \
             [ "$DEPLOY_FILES" = "true" ]; then
            echo "any_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  promote-webapp:
    if: needs.changes.outputs.webapp_changed == 'true'
    runs-on: ubuntu-latest
    needs: [changes]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ github.token }}

      - name: Reset Docker Hub auth
        run: docker logout docker.io || true

      - name: Log in to Docker Hub for Buildx pulls
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "Docker Hub credentials not configured; continuing without explicit login."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag PR image as latest
        id: retag
        if: needs.changes.outputs.merge_sha != ''
        run: |
          SHA_TAG="${{ env.REGISTRY }}/${{ env.REPO }}:webapp-sha-${{ needs.changes.outputs.merge_sha }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.REPO }}:webapp-latest"

          echo "Promoting $SHA_TAG → $LATEST_TAG"
          docker buildx imagetools create --tag "$LATEST_TAG" "$SHA_TAG"

      - name: Full build (direct push, workflow_dispatch, or missing PR image)
        if: steps.retag.outcome == 'skipped' || steps.retag.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./webapp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:webapp-latest
          secrets: |
            npm_token=${{ secrets.NPM_TOKEN }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote-parser:
    if: needs.changes.outputs.parser_changed == 'true'
    runs-on: ubuntu-latest
    needs: [changes]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ github.token }}

      - name: Reset Docker Hub auth
        run: docker logout docker.io || true

      - name: Log in to Docker Hub for Buildx pulls
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "Docker Hub credentials not configured; continuing without explicit login."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag PR image as latest
        id: retag
        if: needs.changes.outputs.merge_sha != ''
        run: |
          SHA_TAG="${{ env.REGISTRY }}/${{ env.REPO }}:parser-sha-${{ needs.changes.outputs.merge_sha }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.REPO }}:parser-latest"

          echo "Promoting $SHA_TAG → $LATEST_TAG"
          docker buildx imagetools create --tag "$LATEST_TAG" "$SHA_TAG"

      - name: Full build (direct push, workflow_dispatch, or missing PR image)
        if: steps.retag.outcome == 'skipped' || steps.retag.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: ./services/pdf_parser
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:parser-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: |
      always() &&
      needs.changes.outputs.any_deploy == 'true' &&
      needs.promote-webapp.result != 'failure' &&
      needs.promote-parser.result != 'failure'
    runs-on: ubuntu-latest
    needs: [changes, promote-webapp, promote-parser]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GHCR token can read images
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT_READ }}

      - name: Verify images are pullable from GHCR
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.REPO }}:webapp-latest > /dev/null
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.REPO }}:parser-latest > /dev/null

      - name: Deploy to VPS via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy: down (remove orphans) → pull → up
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "root@${VPS_HOST}" bash -s <<'DEPLOY_SCRIPT'
            set -euo pipefail
            cd /docker/personal-finance-manager
            echo ">>> Stopping containers and removing orphans..."
            docker compose down --remove-orphans
            echo ">>> Pulling latest images..."
            docker compose pull
            echo ">>> Starting fresh containers..."
            docker compose up -d
            echo ">>> Waiting for health checks..."
            docker compose ps
          DEPLOY_SCRIPT

          # Cleanup
          rm -f ~/.ssh/deploy_key
