name: Security Audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'webapp/package.json'
      - 'pnpm-lock.yaml'
      - 'packages/*/package.json'
      - 'services/pdf_parser/pyproject.toml'
  schedule:
    # Weekly scan on Mondays at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit npm dependencies
        run: pnpm audit --prod
        continue-on-error: true

      - name: Audit with severity filter
        run: |
          echo "## Checking for high/critical vulnerabilities..."
          pnpm audit --prod --audit-level high

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          cd services/pdf_parser
          pip-audit -r <(pip compile pyproject.toml 2>/dev/null || echo "# skip") || true
          # Fallback: audit from installed packages
          pip install -e . 2>/dev/null || true
          pip-audit --desc 2>/dev/null || echo "No pip dependencies to audit"
        continue-on-error: true
